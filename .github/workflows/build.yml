name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  # ── Web (Emscripten → GitHub Pages) ─────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: emcmake cmake -B build-web -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web

      - name: Prepare pages artifact
        run: |
          mkdir pages
          cp build-web/game.html pages/index.html
          cp build-web/game.js   pages/
          cp build-web/game.wasm pages/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.341.1
          install_runtime: true
          cache: true

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: powershell
        run: |
          mkdir artifact
          cp build\Release\game.exe artifact\
          cp -r build\shaders artifact\
          Compress-Archive -Path artifact\* -DestinationPath windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: windows-x86_64.zip

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev vulkan-tools glslc \
            libgl-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev

      - name: Configure CMake
        # Force X11 only — avoids needing wayland-scanner which isn't in PATH
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/game package/
          cp -r build/shaders package/
          cd package && zip -r ../linux-x86_64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: linux-x86_64.zip

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK + MoltenVK
        run: |
          # shaderc provides glslc, molten-vk provides the Vulkan ICD on macOS
          brew install vulkan-headers molten-vk shaderc
          # Add shaderc's glslc to PATH
          echo "$(brew --prefix shaderc)/bin" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DVulkan_INCLUDE_DIR=$(brew --prefix vulkan-headers)/include \
            -DVulkan_LIBRARY=$(brew --prefix molten-vk)/lib/libMoltenVK.dylib \
            -DGLSLC=$(brew --prefix shaderc)/bin/glslc

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/game package/
          cp -r build/shaders package/
          cd package && zip -r ../macos-arm64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: macos-arm64.zip

  # ── Linux ARM64 ──────────────────────────────────────────────────────────────
  build-linux-arm64:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev vulkan-tools glslc \
            libgl-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/game package/
          cp -r build/shaders package/
          cd package && zip -r ../linux-arm64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: linux-arm64.zip

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag (if needed)
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }} || true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-x86_64/windows-x86_64.zip
            artifacts/linux-x86_64/linux-x86_64.zip
            artifacts/linux-arm64/linux-arm64.zip
            artifacts/macos-arm64/macos-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
