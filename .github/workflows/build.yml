name: CMake Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libvulkan-dev \
            vulkan-tools \
            glslc \
            libgl-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            zip

      - name: Configure CMake (Linux)
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build (Linux)
        run: |
          cd build
          cmake --build . --config Release

      - name: Zip Linux executable and shaders
        run: |
          cd build
          if [ -f game ]; then
            zip -j ../linux-x86_64.zip game
            zip -r ../linux-x86_64.zip shaders/
          else
            echo "Executable not found!"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: linux-x86_64.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK (Windows)
        shell: pwsh
        run: |
          $version = "1.3.296.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          $installer = "$env:TEMP\VulkanSDK.exe"
          Write-Host "Downloading Vulkan SDK $version..."
          Invoke-WebRequest -Uri $url -OutFile $installer
          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$version"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Configure CMake (Windows)
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build (Windows)
        run: |
          cd build
          cmake --build . --config Release

      - name: Zip Windows executable and shaders
        shell: pwsh
        run: |
          $exe = "build\Release\game.exe"
          $shaders = "build\Release\shaders"
          if (Test-Path $exe) {
            Compress-Archive -Path $exe -DestinationPath windows-x86_64.zip -Force
            if (Test-Path $shaders) {
              Compress-Archive -Path $shaders -DestinationPath windows-x86_64.zip -Update
            }
          } else {
            Write-Error "Executable not found at $exe"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: .

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: .

      - name: Create tag
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch --tags
          latest_tag=$(git tag --sort=-creatordate | head -n1)

          if [ -z "$latest_tag" ]; then
            new_tag="v1.0.0"
          else
            tag_core=${latest_tag#v}
            IFS='.' read -r major minor patch <<< "$tag_core"
            minor=${minor:-0}
            patch=${patch:-0}
            patch=$((patch+1))
            new_tag="v$major.$minor.$patch"
          fi

          echo "New tag: $new_tag"
          git tag $new_tag
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git $new_tag
          echo "tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: Automated release from GitHub Actions
          files: |
            linux-x86_64.zip
            windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}